<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cromart | Personalizados</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- CONFIGURACIÓN GENERAL --- */
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #262626;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --ws-color: #25d366;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
        }

        header { text-align: center; padding: 50px 20px; }
        h1 { color: var(--accent-color); font-size: 2.5em; text-transform: uppercase; margin: 0; }
        .subtitle { color: #888; margin-top: 10px; }

        /* --- FILTROS --- */
        .categorias { text-align: center; margin: 20px 0; }
        .btn-filtro {
            background: transparent; border: 1px solid var(--accent-color);
            color: var(--accent-color); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; margin: 5px; transition: 0.3s;
        }
        .btn-filtro:hover { background: var(--accent-color); color: #000; }

        /* --- GRILLA --- */
        .contenedor {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; padding: 20px;
        }

        .tarjeta {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid #333; transition: 0.3s;
            display: flex; flex-direction: column; height: 100%;
            opacity: 0; transform: translateY(20px);
        }
        .tarjeta.visible { opacity: 1; transform: translateY(0); }
        .tarjeta:hover { border-color: var(--accent-color); transform: translateY(-5px); }

        /* --- IMÁGENES (VUELTA A CONTAIN MEJORADO) --- */
        .imagen-prod {
            width: 100%;
            height: 250px;
            object-fit: contain; /* No corta la imagen */
            background-color: #222; /* Fondo más oscuro para que no distraiga */
            display: block;
            cursor: zoom-in;
            padding: 5px; /* Pequeño margen para que no toque los bordes del marco */
            box-sizing: border-box;
        }

        .info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .cat-tag { font-size: 0.7em; color: var(--accent-color); text-transform: uppercase; font-weight: bold; }
        .nombre { font-size: 1.1em; margin: 10px 0; font-weight: 700; }
        .precio { color: #ccc; font-size: 0.9em; margin-bottom: 15px; }
        .btn-pedido {
            display: block; text-align: center; background: var(--ws-color);
            color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold;
        }

        /* --- BOTONES FLOTANTES --- */
        .float-ws {
            position: fixed; bottom: 20px; right: 20px;
            background: #25d366; width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 9999; transition: 0.3s;
        }
        .float-ws:hover { transform: scale(1.1); }

        #btnSubir {
            display: none; position: fixed; bottom: 90px; right: 25px;
            z-index: 9998; border: none; background-color: var(--accent-color);
            color: black; cursor: pointer; border-radius: 50%;
            width: 50px; height: 50px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;
        }

        /* --- MODAL / LIGHTBOX --- */
        .modal {
            display: none; position: fixed; z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9); cursor: zoom-out;
            align-items: center; justify-content: center;
        }
        .modal-contenido {
            max-width: 90%; max-height: 85%;
            border: 2px solid var(--accent-color); border-radius: 10px;
            margin: auto; display: block;
        }
        .cerrar {
            position: absolute; top: 20px; right: 35px;
            color: #fff; font-size: 40px; font-weight: bold; cursor: pointer;
        }

        @media (max-width: 600px) {
            .contenedor { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
            .imagen-prod { height: 180px; } /* Ajuste para que en el celu no sobre tanto espacio */
        }
    </style>
</head>
<body>

<header>
    <h1>CROMART</h1>
    <p class="subtitle">Diseños exclusivos & Personalizados</p>
    <div class="categorias">
        <button class="btn-filtro">Todo</button>
        <button class="btn-filtro">Sublimación</button>
        <button class="btn-filtro">Vinilos</button>
        <button class="btn-filtro">Stickers</button>
    </div>
</header>

<div class="contenedor">
    </div>

<footer style="background-color: #111; padding: 50px 20px; margin-top: 50px; border-top: 1px solid #333;">
    </footer>

<div id="miModal" class="modal">
    <span class="cerrar" onclick="cerrarModal()">&times;</span>
    <img class="modal-contenido" id="imgAmpliada">
</div>

<button onclick="subirArriba()" id="btnSubir" title="Volver arriba">↑</button>

<a href="https://wa.me/5493492681799?text=Hola%20Cromart!%20Consulta%20General" class="float-ws" target="_blank" id="whatsapp-fijo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35" alt="WhatsApp">
</a>

<script>
    // 1. APARICIÓN SUAVE Y BOTÓN SUBIR (UNIFICADO)
    const tarjetas = document.querySelectorAll('.tarjeta');
    const btnSubir = document.getElementById("btnSubir");

    window.onscroll = function() {
        // Control de tarjetas
        tarjetas.forEach(tarjeta => {
            const distanciaTop = tarjeta.getBoundingClientRect().top;
            if (distanciaTop < window.innerHeight * 0.9) {
                tarjeta.classList.add('visible');
            }
        });

        // Control botón subir
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btnSubir.style.display = "block";
        } else {
            btnSubir.style.display = "none";
        }
    };

    // 2. FILTROS
    const botones = document.querySelectorAll('.btn-filtro');
    botones.forEach(boton => {
        boton.addEventListener('click', () => {
            const filtro = boton.textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            tarjetas.forEach(tarjeta => {
                tarjeta.classList.remove('visible');
                setTimeout(() => {
                    if (filtro === 'todo' || tarjeta.classList.contains(filtro)) {
                        tarjeta.style.display = 'flex';
                        setTimeout(() => tarjeta.classList.add('visible'), 50);
                    } else {
                        tarjeta.style.display = 'none';
                    }
                }, 200);
            });
        });
    });

    // 3. LIGHTBOX (LA LUPA)
    const modal = document.getElementById("miModal");
    const imgModal = document.getElementById("imgAmpliada");

    document.querySelectorAll('.imagen-prod').forEach(img => {
        img.onclick = function() {
            modal.style.display = "flex";
            imgModal.src = this.src;
        }
    });

    function cerrarModal() { modal.style.display = "none"; }
    modal.onclick = function(e) { if(e.target !== imgModal) cerrarModal(); }

    function subirArriba() { window.scrollTo({top: 0, behavior: 'smooth'}); }

    // Ejecutar al cargar
    window.onload = () => {
        tarjetas.forEach(t => { if(t.getBoundingClientRect().top < window.innerHeight) t.classList.add('visible'); });
    };
</script>
</body>
</html>
